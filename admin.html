<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приёмная комиссия — Сотрудник</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#3056D3;--bg:#f0f4ff;--text:#0f1f4b;--text-2:#5a6a8a;--text-3:#a0aec0;--border:rgba(48,86,211,.12);--shadow:0 4px 20px rgba(48,86,211,.10);--green:#059669;--red:#e53e3e}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1a2e8f,#3056D3,#4f75ff)}
.login-card{background:white;border-radius:28px;padding:40px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,.2);text-align:center}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#3056D3,#1e3fa8);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;overflow:hidden}
.login-logo img{width:72px;height:72px;object-fit:contain}
.login-logo svg{width:36px;height:36px;color:white}
.login-card h2{font-size:21px;font-weight:900;color:var(--text);margin-bottom:5px}
.login-card p{font-size:13px;color:var(--text-2);margin-bottom:24px;line-height:1.5}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d0d8f0;transition:all .2s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pk{padding:15px;background:#f8f9ff;border:2px solid transparent;border-radius:13px;font-family:inherit;font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s}
.pk:hover{background:#eef1fb;border-color:var(--blue)}
.pk:active{transform:scale(.93)}
.pk.del{font-size:14px;color:var(--text-2)}
.pk.zero{grid-column:2}
.btn-enter{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),#4f75ff);color:white;border:none;border-radius:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.login-err{color:var(--red);font-size:12px;margin-top:10px;font-weight:600;min-height:18px}
.admin-screen{display:none;min-height:100vh}
.a-header{background:linear-gradient(135deg,#1a2e8f,#3056D3,#4f75ff);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(48,86,211,.3)}
.a-hLeft{display:flex;align-items:center;gap:12px}
.a-logo{width:60px;height:60px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.a-logo img{width: 50px;height:50px;object-fit:contain}
.a-name{font-size:18px;font-weight:800;color:white}
.a-cab{font-size:15px;color:rgba(255,255,255,.65);margin-top:2px}
.btn-out{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);font-family:inherit;font-size:11px;font-weight:700;padding:6px 13px;border-radius:8px;cursor:pointer}
.btn-out:hover{background:rgba(255,255,255,.25)}
.a-tabs{background:white;display:flex;border-bottom:2px solid var(--border);position:sticky;top:68px;z-index:99;box-shadow:0 2px 8px rgba(48,86,211,.06)}
.a-tab{flex:1;padding:13px 8px;font-family:inherit;font-size:13px;font-weight:700;color:var(--text-3);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;margin-bottom:-2px;display:flex;align-items:center;justify-content:center;gap:7px}
.a-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.a-tab svg{width:16px;height:16px}
.a-tbadge{background:var(--blue);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.a-tbadge.g{background:var(--green)}
.a-tbadge.o{background:#d97706}
.a-content{padding:14px 14px 80px;max-width:720px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sc{background:white;border-radius:14px;padding:13px 10px;text-align:center;box-shadow:var(--shadow)}
.sv{font-size:24px;font-weight:900;color:var(--blue);letter-spacing:-1px}
.sl{font-size:11px;color:var(--text-3);font-weight:500;margin-top:3px}
.sc.g .sv{color:var(--green)}.sc.o .sv{color:#d97706}
.panel{background:white;border-radius:20px;overflow:hidden;box-shadow:0 6px 28px rgba(48,86,211,.11);margin-bottom:14px}
.p-top{background:linear-gradient(135deg,var(--blue),#4f75ff);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.p-top-l .p-sub{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:3px}
.p-top-l .p-title{font-size:16px;font-weight:800;color:white}
.p-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:5px 12px;font-size:12px;font-weight:700;color:white}
.cur-block{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0;gap:14px}
.cur-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text-3);text-transform:uppercase;margin-bottom:7px}
.cur-num{font-size:64px;font-weight:900;color:var(--blue);line-height:1;letter-spacing:-3px}
.cur-pfx{font-size:28px;letter-spacing:0}
.cur-empty{font-size:15px;font-weight:600;color:var(--text-3);padding:8px 0}
.next-card{background:#f5f7ff;border-radius:12px;padding:12px 14px;min-width:130px;flex-shrink:0}
.nc-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.nc-row:last-child{margin-bottom:0}
.nc-ic{width:24px;height:24px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nc-ic svg{width:12px;height:12px;color:white}
.nc-v{font-size:12px;font-weight:700;color:var(--text)}
.nc-l{font-size:10px;color:var(--text-3)}
.acts{padding:12px 20px 16px;display:flex;gap:10px}
.btn-next{flex:1;padding:14px;background:linear-gradient(135deg,var(--blue),#4f75ff);color:white;border:none;border-radius:13px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(48,86,211,.3);transition:all .2s}
.btn-next:hover{transform:translateY(-2px)}
.btn-next:disabled{background:#c8d4f0;box-shadow:none;cursor:not-allowed;transform:none}
.btn-next svg{width:17px;height:17px}
.btn-rst{padding:14px;background:#fff0f0;color:var(--red);border:2px solid #ffc9c9;border-radius:13px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .2s}
.btn-rst:hover{background:#ffe0e0;border-color:var(--red)}
.btn-rst svg{width:14px;height:14px}
.btn-recall{padding:14px 16px;background:#f0fdf4;color:#059669;border:2px solid #86efac;border-radius:13px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .2s}
.btn-recall:hover{background:#dcfce7;border-color:#059669}
.btn-recall:disabled{background:#f8f9fa;color:#94a3b8;border-color:#e2e8f0;cursor:not-allowed}
.btn-recall svg{width:14px;height:14px}
.dash{border:none;border-top:2px dashed #e8ecf8;margin:0 20px}
.ls{padding:12px 20px 16px}
.ls-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ls-t{font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:.5px;text-transform:uppercase}
.ls-b{background:var(--blue);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.ls-b.g{background:var(--green)}
.q-list{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto}
.q-row{display:flex;align-items:center;gap:10px;background:#f8f9ff;border-radius:11px;padding:10px 12px}
.q-row.nx{background:#eef7ff;border:1.5px solid #bcd4ff}
.q-n{width:36px;height:36px;background:var(--blue);color:white;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.q-n.nx{background:var(--green)}
.q-b{flex:1;min-width:0}
.q-c{font-size:10px;color:var(--blue);font-weight:700;letter-spacing:.3px}
.q-nm{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-t{font-size:11px;color:var(--text-3);flex-shrink:0}
.nx-tag{font-size:9.5px;font-weight:700;background:#e0f0ff;color:#0060cc;border-radius:5px;padding:2px 7px;flex-shrink:0}
.empty-q{text-align:center;padding:24px;color:var(--text-3)}
.empty-q svg{width:32px;height:32px;margin:0 auto 8px;display:block;color:#d0d8f0}
.empty-q p{font-size:13px;font-weight:500}
.warn-box{background:#fff8e6;border:1.5px solid #ffd970;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:center;font-size:13px;color:#7a5a00}
.warn-box span{font-size:18px;flex-shrink:0}
.progs-header{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.progs-header h3{font-size:15px;font-weight:800;color:var(--text)}
.progs-header p{font-size:12px;color:var(--text-2);margin-top:3px}
.progs-counts{display:flex;gap:8px;flex-shrink:0}
.pc{background:var(--bg);border-radius:10px;padding:8px 14px;text-align:center}
.pc-v{font-size:18px;font-weight:900;color:var(--blue)}
.pc-l{font-size:10px;color:var(--text-3);font-weight:500}
.pc.g .pc-v{color:var(--green)}
.lv-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.lv-tab{padding:8px 16px;background:white;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:12px;font-weight:700;color:var(--text-2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
.lv-tab:hover{border-color:var(--blue);color:var(--blue)}
.lv-tab.on{background:var(--blue);border-color:var(--blue);color:white;box-shadow:0 4px 14px rgba(48,86,211,.3)}
.lv-tab.empty{opacity:.5}
.lv-cnt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.lv-tab:not(.on) .lv-cnt{background:var(--bg);color:var(--text-3)}
.lv-tab.on .lv-cnt{background:rgba(255,255,255,.25);color:white}
.lv-tab:not(.on) .lv-cnt.on{background:#d4f0e4;color:var(--green)}
.level-panel{background:white;border-radius:18px;overflow:hidden;box-shadow:0 4px 20px rgba(48,86,211,.09);margin-bottom:12px}
.lp-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #f0f2f8}
.lp-title{font-size:14px;font-weight:800;color:var(--text)}
.lp-sub{font-size:12px;color:var(--text-2);margin-top:3px}
.lp-btns{display:flex;gap:7px}
.btn-lv{padding:7px 14px;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-lv.on{background:var(--green);color:white}
.btn-lv.on:hover{background:#047857}
.btn-lv.off{background:#fff0f0;color:var(--red);border:1.5px solid #ffc9c9}
.btn-lv.off:hover{background:#ffe0e0}
.prog-items{display:flex;flex-direction:column}
.prog-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f5f7ff}
.prog-item:last-child{border-bottom:none}
.prog-item:hover{background:#f8f9ff}
.prog-code{font-size:10.5px;font-weight:700;color:var(--blue);min-width:74px;flex-shrink:0;letter-spacing:.3px}
.prog-name{flex:1;font-size:12px;font-weight:500;color:var(--text);line-height:1.35}
.prog-ip{font-size:9px;font-weight:700;background:#dde5ff;color:var(--blue);border-radius:4px;padding:2px 6px;margin-right:4px}
.no-progs{text-align:center;padding:28px;color:var(--text-3);font-size:13px;font-weight:500}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-sl{position:absolute;cursor:pointer;inset:0;background:#d0d8f0;border-radius:24px;transition:.2s}
.toggle-sl::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle input:checked + .toggle-sl{background:var(--green)}
.toggle input:checked + .toggle-sl::before{transform:translateX(18px)}
.global-acts{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.btn-all-on{padding:10px 18px;background:linear-gradient(135deg,var(--green),#047857);color:white;border:none;border-radius:11px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.btn-all-on:hover{opacity:.9}
.btn-all-off{padding:10px 18px;background:#fff0f0;color:var(--red);border:2px solid #ffc9c9;border-radius:11px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.btn-all-off:hover{background:#ffe0e0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f1f4b;color:white;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>


<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="ВКУ" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <svg style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <h2>Вход тех.секретаря</h2>
    <p>Введите ваш PIN-код</p>
    <div class="pin-row" id="pinDots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button><button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button><button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button><button class="pk" onclick="pk('9')">9</button>
      <button class="pk del" onclick="pdel()">⌫</button><button class="pk zero" onclick="pk('0')">0</button>
    </div>
    <button class="btn-enter" onclick="tryLogin()">Войти</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="admin-screen" id="adminScreen">
  <header class="a-header">
    <div class="a-hLeft">
      <div class="a-logo">
        <img src="logo.png" alt="ВКУ" onerror="this.style.display='none'">
      </div>
      <div>
        <div class="a-name" id="aName">—</div>
        <div class="a-cab" id="aCab">—</div>
      </div>
    </div>
    <button class="btn-out" onclick="logout()">Выйти</button>
  </header>
  <div class="a-tabs" id="aTabs"></div>
  <div class="a-content" id="aContent"></div>
</div>

<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="staff-config.js"></script>
<script src="programs.js"></script>
<script src="admin.js"></script>
</body>
</html>
