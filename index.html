<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Электронная очередь — ВКУ им. Аманжолова</title>
<script src="staff-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="programs.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --blue: #3056D3;
  --blue-dark: #1e3fa8;
  --blue-light: #6b8aff;
  --blue-pale: #eef1fb;
  --gold: #f5a623;
  --gold-light: #fff3d6;
  --text: #0f1f4b;
  --text-2: #5a6a8a;
  --text-3: #a0aec0;
  --border: rgba(48,86,211,.12);
  --white: #ffffff;
  --bg: #f0f4ff;
  --radius: 20px;
  --shadow: 0 20px 60px rgba(48,86,211,.15);
  --shadow-sm: 0 4px 20px rgba(48,86,211,.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND BLOBS ── */
body::before {
  content: '';
  position: fixed;
  top: -120px; left: -120px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(48,86,211,.18) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(107,138,255,.15) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
.header {
  position: relative;
  background: linear-gradient(135deg, #1a2e8f 0%, #3056D3 50%, #4f75ff 100%);
  padding: 0 0 0;
  overflow: hidden;
  z-index: 10;
}
.header-noise {
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  pointer-events: none;
}
/* decorative circles */
.header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,.07);
  pointer-events: none;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 30%;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}

.header-inner {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 20px 16px;
  z-index: 2;
}

.logo-box {
  flex-shrink: 0;
  width: 72px; height: 72px;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,255,255,.25);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.logo-box svg { width: 36px; height: 36px; }

.header-titles { flex: 1; min-width: 0; }
.header-titles .uni-name {
  font-size: 17px;
  font-weight: 800;
  color: white;
  line-height: 1.2;
  letter-spacing: -.2px;
}
.header-titles .uni-sub {
  font-size: 15px;
  color: rgba(255,255,255,.65);
  margin-top: 3px;
  line-height: 1.35;
}

/* ── LANG BAR ── */
.lang-bar {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: flex-end;
  padding: 0 20px 18px;
}
.lang-switcher {
  display: flex;
  background: rgba(0,0,0,.2);
  border-radius: 12px;
  padding: 3px;
  gap: 2px;
}
.lang-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.55);
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .6px;
  padding: 6px 14px;
  border-radius: 9px;
  cursor: pointer;
  transition: all .2s cubic-bezier(.34,1.3,.64,1);
  line-height: 1;
}
.lang-btn:hover { color: rgba(255,255,255,.85); }
.lang-btn.active {
  background: white;
  color: var(--blue);
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
  transform: scale(1.04);
}

/* ── STEP INDICATOR ── */
.step-bar {
  position: relative; z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 20px 20px;
}
.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  border: 1.5px solid rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,.6);
  transition: all .3s;
  position: relative;
}
.step-dot.done {
  background: rgba(255,255,255,.9);
  border-color: white;
  color: var(--blue);
}
.step-dot.active {
  background: white;
  border-color: white;
  color: var(--blue);
  box-shadow: 0 0 0 4px rgba(255,255,255,.2);
}
.step-line {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,.2);
  max-width: 60px;
  transition: background .3s;
}
.step-line.done { background: rgba(255,255,255,.7); }
.step-label {
  position: absolute;
  bottom: -18px;
  white-space: nowrap;
  font-size: 9px;
  font-weight: 600;
  color: rgba(255,255,255,.55);
  letter-spacing: .3px;
}
.step-dot.active .step-label,
.step-dot.done .step-label { color: rgba(255,255,255,.85); }

/* ── MAIN CONTENT ── */
.main {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 28px 16px 60px;
}

/* ── SECTION TITLE ── */
.section-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -.5px;
  margin-bottom: 6px;
}
.section-sub {
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 22px;
  line-height: 1.5;
}

/* ── LEVEL CARDS ── */
.level-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.level-card {
  background: white;
  border: 2px solid transparent;
  border-radius: 22px;
  padding: 22px 14px 20px;
  text-align: center;
  cursor: pointer;
  transition: all .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  position: relative;
  overflow: hidden;
}
.level-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--blue-light));
  opacity: 0;
  transition: opacity .2s;
}
.level-card:hover {
  border-color: var(--blue);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(48,86,211,.2);
}
.level-card:hover::before { opacity: 1; }
.level-card:active { transform: translateY(-1px) scale(.98); }

.lc-icon {
  width: 60px; height: 60px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .22s;
}
.level-card:hover .lc-icon { transform: scale(1.08); }
.lc-icon svg { width: 28px; height: 28px; }

.lc-icon.blue { background: linear-gradient(135deg, #eef1fb, #dde5ff); }
.lc-icon.blue svg { color: var(--blue); }
.lc-icon.purple { background: linear-gradient(135deg, #f3eeff, #e5d5ff); }
.lc-icon.purple svg { color: #7c3aed; }
.lc-icon.green { background: linear-gradient(135deg, #edfff4, #c6f6d5); }
.lc-icon.green svg { color: #059669; }
.lc-icon.orange { background: linear-gradient(135deg, #fff7ed, #fed7aa); }
.lc-icon.orange svg { color: #ea580c; }

.lc-label {
  font-size: 14px; font-weight: 800; color: var(--text);
  line-height: 1.2; letter-spacing: -.2px;
}
.lc-count {
  font-size: 11px; color: var(--text-3); font-weight: 500;
}
.lc-arrow {
  width: 28px; height: 28px;
  background: var(--blue-pale);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-top: 2px;
  transition: background .2s;
}
.lc-arrow svg { width: 12px; height: 12px; color: var(--blue); }
.level-card:hover .lc-arrow { background: var(--blue); }
.level-card:hover .lc-arrow svg { color: white; }

/* ── SEARCH ── */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}
.search-wrap input {
  width: 100%;
  padding: 14px 16px 14px 46px;
  border: 2px solid var(--border);
  border-radius: 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  background: white;
  color: var(--text);
  box-shadow: var(--shadow-sm);
  transition: all .2s;
}
.search-wrap input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(48,86,211,.1);
}
.search-wrap input::placeholder { color: var(--text-3); }
.s-icon {
  position: absolute;
  left: 15px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  width: 18px; height: 18px;
  pointer-events: none;
}

/* ── PROGRAM LIST ── */
.prog-list { display: flex; flex-direction: column; gap: 10px; }

.prog-item {
  background: white;
  border: 2px solid transparent;
  border-radius: 18px;
  padding: 14px 14px 14px 14px;
  cursor: pointer;
  transition: all .18s;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 12px rgba(48,86,211,.07);
}
.prog-item:hover {
  border-color: var(--blue);
  box-shadow: 0 8px 24px rgba(48,86,211,.15);
  transform: translateX(4px);
}
.prog-item:active { transform: translateX(2px) scale(.99); }

.pi-dot {
  flex-shrink: 0;
  width: 40px; height: 40px;
  background: var(--blue-pale);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.pi-dot svg { width: 18px; height: 18px; color: var(--blue); }

.pi-body { flex: 1; min-width: 0; }
.pi-code {
  font-size: 10.5px; font-weight: 700; color: var(--blue);
  letter-spacing: .4px; margin-bottom: 3px;
}
.pi-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.4;
}
.pi-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9.5px; font-weight: 700;
  background: linear-gradient(135deg, #dde5ff, #c7d3ff);
  color: var(--blue);
  border-radius: 6px;
  padding: 2px 7px;
  margin-top: 5px;
  letter-spacing: .3px;
}

.pi-chevron {
  flex-shrink: 0; color: var(--text-3);
  width: 20px; height: 20px;
  transition: color .15s;
}
.prog-item:hover .pi-chevron { color: var(--blue); }

/* ── TICKET ── */
.ticket-wrap { position: relative; }

/* confetti dots */
.confetti {
  position: absolute;
  top: -10px; left: 0; right: 0;
  pointer-events: none;
  overflow: hidden;
  height: 60px;
}
.cf { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 1.2s ease forwards; }
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(70px) rotate(360deg); opacity: 0; }
}

.ticket {
  background: white;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(48,86,211,.18);
}

/* ticket top gradient */
.ticket-top {
  background: linear-gradient(135deg, #1a2e8f 0%, #3056D3 55%, #5b7bff 100%);
  padding: 28px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.ticket-top::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
}
.ticket-top::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
}
.tt-logo {
  position: relative; z-index: 1;
  width: 52px; height: 52px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,.3);
  border-radius: 16px;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
}
.tt-logo svg { width: 28px; height: 28px; color: white; }
.tt-uni { position: relative; z-index: 1; font-size: 11px; color: rgba(255,255,255,.7); margin-bottom: 4px; font-weight: 500; }
.tt-level { position: relative; z-index: 1; font-size: 20px; font-weight: 900; color: white; letter-spacing: -.4px; }

/* number section */
.ticket-num-section {
  padding: 24px 24px 0;
  text-align: center;
}
.tn-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text-3); text-transform: uppercase; margin-bottom: 10px;
}
.tn-number {
  font-size: 72px; font-weight: 900; color: var(--blue);
  line-height: 1; letter-spacing: -3px;
}
.tn-prefix { font-size: 32px; letter-spacing: 0; }

/* dashed separator */
.dash-sep {
  border: none;
  border-top: 2.5px dashed #e8ecf8;
  margin: 22px 0 0;
}

/* info rows */
.ticket-info { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 10px; }

.ti-row {
  display: flex; align-items: center;
  background: var(--bg);
  border-radius: 14px;
  padding: 13px 16px;
  gap: 12px;
}
.ti-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ti-icon svg { width: 18px; height: 18px; }
.ti-icon.blue   { background: var(--blue-pale); }
.ti-icon.blue svg { color: var(--blue); }
.ti-icon.purple { background: #f3eeff; }
.ti-icon.purple svg { color: #7c3aed; }
.ti-icon.green  { background: #edfff4; }
.ti-icon.green svg  { color: #059669; }
.ti-icon.gold   { background: var(--gold-light); }
.ti-icon.gold svg   { color: var(--gold); }

.ti-body { flex: 1; min-width: 0; }
.ti-label { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 2px; }
.ti-val { font-size: 15px; font-weight: 800; color: var(--text); }
.ti-val.big { font-size: 18px; color: var(--blue); }

/* program block */
.ticket-prog {
  margin: 10px 20px 0;
  background: linear-gradient(135deg, #f8f9ff, #eef1fb);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
}
.tp-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--blue); text-transform: uppercase; margin-bottom: 7px;
  display: flex; align-items: center; gap: 6px;
}
.tp-label svg { width: 12px; height: 12px; }
.tp-name { font-size: 13.5px; font-weight: 700; color: var(--text); line-height: 1.45; }

/* notice */
.ticket-notice {
  margin: 16px 20px 0;
  background: var(--gold-light);
  border: 1.5px solid #ffe08a;
  border-radius: 14px;
  padding: 12px 14px;
  display: flex; gap: 10px; align-items: flex-start;
}
.ticket-notice svg { width: 16px; height: 16px; color: var(--gold); flex-shrink: 0; margin-top: 1px; }
.ticket-notice p { font-size: 12px; color: #7a5500; line-height: 1.5; font-weight: 500; }

/* QR hint */
.ticket-footer { padding: 16px 20px 24px; }
.qr-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--bg);
  border: 1.5px dashed #c8d0e8;
  border-radius: 14px;
  padding: 14px 16px;
  color: var(--text-3);
}
.qr-hint svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--text-3); }
.qr-hint span { font-size: 12px; font-weight: 500; line-height: 1.45; color: var(--text-2); }

/* footer btn */
.btn-home {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--blue) 0%, #4f75ff 100%);
  color: white;
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 8px 24px rgba(48,86,211,.35);
  transition: all .2s;
  letter-spacing: -.1px;
}
.btn-home:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(48,86,211,.4); }
.btn-home:active { transform: none; }
.btn-home svg { width: 16px; height: 16px; }

/* ── BREADCRUMB ── */
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 20px;
  font-size: 12px; font-weight: 500; color: var(--text-3);
}
.bc-link { color: var(--blue); cursor: pointer; font-weight: 600; }
.bc-link:hover { text-decoration: underline; }
.bc-sep { color: #ccd3ea; }

/* ── EMPTY ── */
.empty {
  text-align: center;
  padding: 40px 0;
  color: var(--text-3);
}
.empty svg { width: 48px; height: 48px; color: #d5dcf0; margin: 0 auto 12px; display: block; }
.empty p { font-size: 13px; font-weight: 500; }

/* ── ANIMATIONS ── */
.fade-in  { animation: fadeIn .3s cubic-bezier(.2,.8,.4,1) both; }
.slide-up { animation: slideUp .35s cubic-bezier(.2,.8,.4,1) both; }

@keyframes fadeIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
@keyframes slideUp { from { opacity:0; transform:translateY(24px) scale(.98); } to { opacity:1; transform:none; } }

.stagger-1 { animation-delay: .05s; }
.stagger-2 { animation-delay: .1s; }
.stagger-3 { animation-delay: .15s; }
.stagger-4 { animation-delay: .2s; }



/* ── CHARACTER ── */
.char-scene {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 10px;
  position: relative;
}
.char-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  filter: drop-shadow(0 18px 24px rgba(48,86,211,.18));
}
.char-shadow {
  position: absolute;
  bottom: 4px; left: 50%;
  transform: translateX(-50%);
  width: 80px; height: 16px;
  background: radial-gradient(ellipse, rgba(48,86,211,.22) 0%, transparent 75%);
  animation: shadowPulse 2.4s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%,100% { transform: translateX(-50%) scaleX(1); opacity:.7; }
  50%      { transform: translateX(-50%) scaleX(.75); opacity:.35; }
}

/* Speech / thought bubble */
.char-bubble {
  position: absolute;
  top: -10px; right: -10px;
  background: white;
  border-radius: 18px 18px 18px 4px;
  padding: 8px 14px;
  font-size: 13px; font-weight: 700; color: var(--text);
  box-shadow: 0 4px 20px rgba(48,86,211,.15);
  white-space: nowrap;
  animation: bubblePop .5s cubic-bezier(.34,1.6,.64,1) both;
  animation-delay: .4s;
  opacity: 0;
}
.char-bubble::after {
  content: '';
  position: absolute;
  bottom: -7px; left: 14px;
  width: 12px; height: 12px;
  background: white;
  clip-path: polygon(0 0, 100% 0, 0 100%);
  border-radius: 0 0 0 3px;
}
@keyframes bubblePop {
  from { opacity:0; transform: scale(.6) translateY(6px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

/* Floating dots for thought bubble */
.thought-dots {
  position: absolute;
  top: 20px; right: 5px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.td { border-radius: 50%; background: white; box-shadow: 0 2px 8px rgba(48,86,211,.2); }
.td1 { width: 5px; height: 5px; animation: tdPop .5s .2s both; }
.td2 { width: 7px; height: 7px; animation: tdPop .5s .3s both; }
.td3 { width: 10px; height: 10px; animation: tdPop .5s .4s both; }
@keyframes tdPop { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }

/* ── STATE 1: FLOAT + WAVE ── */
@keyframes charFloat {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}
@keyframes waveArm {
  0%,100% { transform: rotate(0deg); }
  25%     { transform: rotate(-28deg); }
  75%     { transform: rotate(10deg); }
}
@keyframes eyeBlink {
  0%,90%,100% { transform: scaleY(1); }
  95%         { transform: scaleY(.1); }
}

.char-wave  { transform-origin: 80% 100%; animation: waveArm 1s ease-in-out infinite; }
.char-blink { transform-origin: center; animation: eyeBlink 3.5s ease-in-out infinite; }

@keyframes headTilt {

  40%     { transform: rotate(-8deg); }
  70%     { transform: rotate(5deg); }
}
@keyframes floatQ {
  0%,100% { transform: translateY(0) rotate(0deg); opacity:.9; }
  50%     { transform: translateY(-10px) rotate(10deg); opacity:1; }
}

.fq3 { animation: floatQ 1.8s .8s ease-in-out infinite; }

/* ── STATE 3: WAIT ── */
@keyframes ticketBob {
  0%,100% { transform: rotate(-5deg); }
  50%     { transform: rotate(5deg); }
}
@keyframes legSwing {
  0%,100% { transform: rotate(0deg); }
  50%     { transform: rotate(8deg); }
}

  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-6px); }
}

.ticket-bob    { transform-origin: 50% 90%; animation: ticketBob 2s ease-in-out infinite; }

/* Stars sparkle */
@keyframes sparkle {
  0%,100% { opacity:0; transform:scale(0) rotate(0deg); }
  50%     { opacity:1; transform:scale(1) rotate(180deg); }
}
.sp1 { animation: sparkle 1.6s .0s ease-in-out infinite; }
.sp2 { animation: sparkle 1.6s .5s ease-in-out infinite; }

 doctor:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

// CACHE_ACTIVE = { staff_id: ['code1','code2',...], ... } — устанавливается сотрудниками
let CACHE_ACTIVE_INDEX = {};

// Подписываемся на Firebase — получаем активные ОП в реальном времени
window.addEventListener('DOMContentLoaded', function() {
  if (window.db) {
    window.db.ref('active').on('value', function(snap) {
      CACHE_ACTIVE_INDEX = snap.val() || {};
      if (S && S.step === 'level') render(); // обновляем экран выбора уровня
    });

});

// Возвращает плоский массив всех активных кодов ОП от всех сотрудников
function getActivePrograms() {
  const all = [];
  Object.values(CACHE_ACTIVE_INDEX).forEach(function(arr) {
    if (Array.isArray(arr)) arr.forEach(function(c) { all.push(c); });
  });
  return all;
}

// Найти сотрудника по активному коду ОП
function getActiveStaffByCode(code) {
  const staffId = Object.keys(CACHE_ACTIVE_INDEX).find(function(id) {
    return Array.isArray(CACHE_ACTIVE_INDEX[id]) && CACHE_ACTIVE_INDEX[id].includes(code);
  });
  if (!staffId || typeof STAFF_CONFIG === 'undefined') return null;
  return STAFF_CONFIG.find(function(s) { return s.id === staffId; }) || null;
}

let S = { step:'level', level:null, ticket:null, search:'' };

function stepIndex() { return ['level','program','ticket'].indexOf(S.step); }

// ── STEP BAR ──────────────────────────────────────────────────────────────────
function renderStepBar() {
  const steps = t('steps');
  const cur = stepIndex();
  const locked = S.step === 'ticket'; // на экране талона навигация заблокирована
  let html = '';
  steps.forEach((s,i) => {
    const isDone   = i < cur;
    const isActive = i === cur;
    html += `<div class="step-dot ${isDone?'done':''} ${isActive?'active':''}">
      ${isDone ? '✓' : i+1}
      <span class="step-label">${s}</span>
    </div>`;
    if(i < steps.length-1) html += `<div class="step-line ${isDone?'done':''}"></div>`;
  });
  document.getElementById('step-bar').innerHTML = html;
}

// ── BREADCRUMB ────────────────────────────────────────────────────────────────
function renderBreadcrumb() {
  const lvlName = S.level ? t('levels')[LEVEL_IDS.indexOf(S.level)] : '';

    <span class="bc-link" onclick="goStep('level')">${t('home')}</span>`;

    if(S.step==='ticket') {
      html += `<span class="bc-sep">›</span><span class="bc-link" onclick="goStep('program')">${lvlName}</span>`;
    } else {
      html += `<span class="bc-sep">›</span><span>${lvlName}</span>`;
    }

  if(S.step==='ticket') html += `<span class="bc-sep">›</span><span>${t('ticket')}</span>`;
  html += `</div>`;
  return html;

// ── RENDER LEVEL ──────────────────────────────────────────────────────────────
function renderLevel() {
  const active = new Set(getActivePrograms());
  const counts = LEVEL_IDS.map(id => {
    const progs = PROGRAMS[id] || [];
    return active.size > 0 ? progs.filter(p => active.has(p.code)).length : progs.length;

  const active = new Set(getActivePrograms());

  const progs = active.size > 0 ? allProgs.filter(p => active.has(p.code)) : allProgs;

  const filtered = progs.filter(p => p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));
  return `
  <div class="fade-in">
    ${renderBreadcrumb()}

            </div>

          </div>`).join('')
      }
    </div>
  </div>`;
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function makeConfetti() {
  const colors = ['#3056D3','#6b8aff','#FFD700','#ff6b6b','#51cf66','#cc5de8'];
  let html = '';
  for(let i=0;i<18;i++) {
    const x = Math.random()*100;
    const delay = Math.random()*0.6;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const size = 6+Math.random()*6;
    html += `<div class="cf" style="left:${x}%;background:${color};width:${size}px;height:${size}px;animation-delay:${delay}s;border-radius:${Math.random()>0.5?'50%':'3px'}"></div>`;
  }
  return `<div class="confetti">${html}</div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if(S.step==='level')   app.innerHTML = renderLevel();
  if(S.step==='program') app.innerHTML = renderProgram();
  if(S.step==='ticket')  app.innerHTML = renderTicket();
  renderStepBar();
}

function selectLevel(id) {
  S.level=id; S.step='program'; S.search='';
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function selectProgram(code) {
  console.log("Нажали ОП:", code);
  const p = PROGRAMS[S.level].find(x => x.code === code);

  if (!p) {
    alert('ОП не найдена');
    return;
  }

  const staff = getStaffByProgram(code);
  
console.log("Сотрудник:", staff);
console.log("Firebase db:", db);
  if (!staff) {
    alert('Для этой ОП не назначен сотрудник. Проверьте staff-config.js');
    return;
  }

  console.log("Сотрудник:", staff);
  const queueRef = db.ref('queues/' + staff.id);

  queueRef.transaction(function(data) {
    if (!data) {
      data = {
        current: 0,
        nextNumber: 0,
        queue: [],
        history: []
      };
    }

    if (!data.queue) data.queue = [];
    if (!data.history) data.history = [];
    if (!data.nextNumber) data.nextNumber = 0;

    data.nextNumber += 1;

    data.queue.push({
      number: data.nextNumber,
      code: p.code,
      name: p.name,
      time: new Date().toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      }),
      called: false
    });

    return data;
 }, function(error, committed, snapshot) {
  if (error) {
    alert('Firebase ошибка: ' + error.message);
    console.error(error);
    return;
  }

  if (!committed) {
    alert('Запись не сохранена');
    return;
  }



  const data = snapshot.val();
  const ticket = data.queue[data.queue.length - 1];

  S.ticket = {
    number: ticket.number,
    before: data.queue.filter(q => !q.called).length - 1,
    code: p.code,
    name: p.name,
    cabinet: staff.cabinet,
    floor: staff.floor,
    staffId: staff.id
  };

  S.step = 'ticket';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
}
function goStep(step) {
  if (step === 'level') {
    S.step = 'level';
    S.level = null;
    S.ticket = null;
    S.search = '';
  }

  if (step === 'program') {
    S.step = 'program';
    S.ticket = null;
  }

  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── CALL NOTIFICATION ──────────────────────────────────────────────────────
let callListener = null;

function startCallListener() {
  if (!S.ticket || !S.ticket.staffId || !window.db) return;
  stopCallListener();
  const lvlIdx = ['bachelor','master','doctor','college'].indexOf(S.level);
  const prefix = ['B','M','D','C'][lvlIdx] || 'B';
  const myNum = S.ticket.number;

  callListener = window.db.ref('queues/' + S.ticket.staffId + '/current')
    .on('value', function(snap) {
      const cur = snap.val();
      if (cur && cur == myNum) {
        showCallNotification(prefix, myNum);
      }
    });
}

function stopCallListener() {
  if (callListener && S.ticket && window.db) {
    window.db.ref('queues/' + S.ticket.staffId + '/current').off('value', callListener);
    callListener = null;
  }
}

function showCallNotification(prefix, num) {
  const numStr = prefix + '-' + String(num).padStart(3,'0');
  const cab = S.ticket ? S.ticket.cabinet : '—';
  const floor = S.ticket ? S.ticket.floor : '';

  const titles = { rus:'Вас вызывают!', kaz:'Сізді шақырды!', eng:'You are called!' };
  const subs   = { rus:'Пожалуйста, пройдите в кабинет', kaz:'Кабинетке өтіңіз', eng:'Please go to the office' };

  document.getElementById('co-title').textContent = titles[lang] || titles.rus;
  document.getElementById('co-num').innerHTML  = '<span>' + prefix + '-</span>' + String(num).padStart(3,'0');
  document.getElementById('co-sub').textContent = subs[lang] || subs.rus;
  document.getElementById('co-cab').textContent = 'Кабинет ' + cab + ' · ' + floor;

  const overlay = document.getElementById('call-overlay');
  overlay.classList.add('show');

  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);

  // Sound beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 200, 400].forEach(function(delay) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay/1000);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay/1000 + 0.3);
      osc.start(ctx.currentTime + delay/1000);
      osc.stop(ctx.currentTime + delay/1000 + 0.3);
    });
  } catch(e) {}
}

function dismissCall() {
  document.getElementById('call-overlay').classList.remove('show');
}

// Update render to add status bar and start listener on ticket step
const _origRender = render;
render = function() {
  _origRender();
  if (S.step === 'ticket') {
    startCallListener();
    // Inject live status bar into ticket
    const lvlIdx = ['bachelor','master','doctor','college'].indexOf(S.level);
    const prefix = ['B','M','D','C'][lvlIdx] || 'B';
    const numStr = prefix + '-' + String(S.ticket.number).padStart(3,'0');
    const statusTexts = {
      rus: 'Ожидайте вызова — <b>' + numStr + '</b>. Вы получите уведомление.',
      kaz: 'Шақырылуды күтіңіз — <b>' + numStr + '</b>. Хабарлама аласыз.',
      eng: 'Wait to be called — <b>' + numStr + '</b>. You will get a notification.',
    };
    const bar = document.createElement('div');
    bar.className = 'ticket-status-bar';
    bar.innerHTML = '<div class="tsb-dot"></div><div class="tsb-text">' + (statusTexts[lang] || statusTexts.rus) + '</div>';
    const notice = document.querySelector('.ticket-notice');
    if (notice) notice.parentNode.insertBefore(bar, notice);
  } else {
    stopCallListener();
  }
};
