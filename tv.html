<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табло — ВКУ им. Аманжолова</title>
<script src="staff-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  color: #0f1f4b;
  overflow-x: hidden;
}

/* ── HEADER ── */
.tv-header {
  background: linear-gradient(135deg, #1a2e8f 0%, #3056D3 60%, #4f75ff 100%);
  padding: 16px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tv-logo-row { display: flex; align-items: center; gap: 14px; }
.tv-logo {
  width: 52px; height: 52px;
  background: rgba(255,255,255,.15);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,.2);
  overflow: hidden;
}
.tv-logo img { width: 48px; height: 48px; object-fit: contain; border-radius: 6px; }
.tv-title-kaz { font-size: 15px; font-weight: 800; color: white; line-height: 1.2; }
.tv-title-rus { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
.tv-right { display: flex; align-items: center; gap: 20px; }
.tv-live {
  display: flex; align-items: center; gap: 7px;
  background: rgba(5,150,105,.25); border: 1px solid rgba(5,150,105,.5);
  border-radius: 20px; padding: 6px 14px;
  font-size: 12px; font-weight: 700; color: #34d399;
}
.live-dot { width: 8px; height: 8px; background: #34d399; border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.tv-clock { font-size: 30px; font-weight: 900; color: white; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
.tv-date { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; text-align: right; }

/* ── GRID ── */
.tv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 28px 32px 100px;
}

/* ── CARD ── */
.tv-card {
  background: white;
  border: 2px solid #e2e8f8;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(48,86,211,.08);
  transition: border-color .3s, box-shadow .3s;
}
.tv-card.active {
  border-color: #10b981;
  box-shadow: 0 0 0 4px rgba(16,185,129,.12), 0 8px 30px rgba(16,185,129,.15);
}
.tv-card.just-called { animation: cardFlash .8s ease; }
@keyframes cardFlash {
  0%,100% { border-color: #10b981; }
  50% { border-color: #059669; box-shadow: 0 0 0 8px rgba(16,185,129,.2), 0 8px 40px rgba(16,185,129,.3); }
}

/* Cabinet header */
.card-cab-bar {
  background: linear-gradient(135deg, #3056D3, #4f75ff);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.cab-num-kaz { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.7); }
.cab-num-rus { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }
.cab-value { font-size: 26px; font-weight: 900; color: white; letter-spacing: -.5px; }

/* Current number */
.card-body {
  padding: 24px 20px 20px;
  text-align: center;
}
.called-label-kaz {
  font-size: 11px; font-weight: 700; color: #6b7280;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px;
}
.called-label-rus {
  font-size: 10px; color: #9ca3af;
  margin-bottom: 14px;
}
.ticket-number {
  font-size: 80px; font-weight: 900; line-height: 1;
  letter-spacing: -4px;
  color: #d1d5e8;
  transition: color .4s, text-shadow .4s;
  font-variant-numeric: tabular-nums;
}
.ticket-number .pfx { font-size: 36px; letter-spacing: 0; }
.ticket-number.called {
  color: #059669;
  text-shadow: 0 0 40px rgba(5,150,105,.25);
  animation: numPop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes numPop { from { transform:scale(.75); opacity:.4; } to { transform:none; opacity:1; } }

.status-row {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-top: 10px; font-size: 12px; font-weight: 600;
}
.status-row.called { color: #059669; }
.status-row.idle { color: #9ca3af; }
.s-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-row.called .s-dot { background: #10b981; animation: blink .9s ease-in-out infinite; }
.status-row.idle .s-dot { background: #d1d5e8; }
.status-kaz { font-weight: 700; }
.status-rus { font-size: 11px; color: #9ca3af; margin-top: 2px; }

/* ── BIG OVERLAY ── */
#tv-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(240,244,255,.92);
  backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  flex-direction: column;
}
#tv-overlay.show { display: flex; }

.overlay-inner {
  text-align: center;
  animation: bannerIn .45s cubic-bezier(.34,1.4,.64,1);
}
@keyframes bannerIn { from { transform:scale(.55) translateY(50px); opacity:0; } to { transform:none; opacity:1; } }

.ov-label-kaz {
  font-size: 22px; font-weight: 800; color: #3056D3;
  letter-spacing: 1px; margin-bottom: 4px;
}
.ov-label-rus {
  font-size: 16px; color: #6b7280; font-weight: 500;
  margin-bottom: 28px;
}
.ov-number {
  font-size: clamp(120px, 22vw, 200px);
  font-weight: 900; line-height: 1; letter-spacing: -8px;
  color: #059669;
  text-shadow: 0 0 80px rgba(5,150,105,.3);
  animation: ovGlow 1.4s ease-in-out infinite;
}
@keyframes ovGlow {
  0%,100% { text-shadow: 0 0 80px rgba(5,150,105,.3); }
  50%     { text-shadow: 0 0 120px rgba(5,150,105,.5); }
}
.ov-number span { font-size: .42em; letter-spacing: -2px; }
.ov-cab {
  margin-top: 20px;
  font-size: 26px; font-weight: 800; color: #0f1f4b;
}
.ov-cab b { color: #3056D3; }
.ov-cab-rus {
  font-size: 18px; color: #6b7280; font-weight: 500;
  margin-top: 4px;
}
.ov-bar-wrap {
  margin: 32px auto 0;
  width: 320px; height: 5px;
  background: #e2e8f8; border-radius: 3px; overflow: hidden;
}
.ov-bar {
  height: 100%; background: #059669; border-radius: 3px;
  animation: barFill 5s linear forwards;
}
@keyframes barFill { from { width:100%; } to { width:0%; } }

/* ── TICKER ── */
.tv-ticker {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1.5px solid #e2e8f8;
  padding: 10px 0;
  height: 44px; overflow: hidden;
}
.ticker-track {
  display: flex; align-items: center; gap: 56px;
  white-space: nowrap;
  animation: tickerScroll 35s linear infinite;
}
@keyframes tickerScroll { from { transform:translateX(100vw); } to { transform:translateX(-100%); } }
.ti { font-size: 13px; font-weight: 600; color: #6b7280; display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.ti .n { color: #3056D3; font-weight: 800; }
.ti.c .n { color: #059669; }
.ti-sep { color: #d1d5e8; font-size: 18px; }

/* no data */
.tv-empty {
  grid-column: 1/-1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; text-align: center; color: #9ca3af;
}
.tv-empty svg { width: 64px; height: 64px; margin-bottom: 16px; color: #d1d5e8; }
.tv-empty h2 { font-size: 20px; font-weight: 700; color: #6b7280; margin-bottom: 6px; }
.tv-empty p { font-size: 14px; }
</style>
</head>
<body>

<header class="tv-header">
  <div class="tv-logo-row">
    <div class="tv-logo">
      <img src="logo.png" alt="ВКУ" onerror="this.style.display='none'">
    </div>
    <div>
      <div class="tv-title-kaz">Шығыс Қазақстан университеті</div>
      <div class="tv-title-rus">Восточно-Казахстанский университет им. Аманжолова</div>
    </div>
  </div>
  <div class="tv-right">
    <div class="tv-live"><div class="live-dot"></div>LIVE</div>
    <div>
      <div class="tv-clock" id="tv-clock">00:00</div>
      <div class="tv-date" id="tv-date">—</div>
    </div>
  </div>
</header>

<div class="tv-grid" id="tv-grid">
  <div class="tv-empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    <h2>Жүктелуде... / Загрузка...</h2>
    <p>Firebase-қа қосылу / Подключение к Firebase</p>
  </div>
</div>

<div class="tv-ticker"><div class="ticker-track" id="ticker-track">
  <span class="ti">Деректер күтілуде / Ожидание данных</span>
</div></div>

<!-- BIG OVERLAY -->
<div id="tv-overlay">
  <div class="overlay-inner">
    <div class="ov-label-kaz">📢 Шақырылуда</div>
    <div class="ov-label-rus">Вызывается</div>
    <div class="ov-number" id="ov-num"><span>B-</span>001</div>
    <div class="ov-cab" id="ov-cab">Кабинет / <b>Кабинет 101</b></div>
    <div class="ov-cab-rus" id="ov-cab-rus"></div>
    <div class="ov-bar-wrap"><div class="ov-bar" id="ov-bar"></div></div>
  </div>
</div>

<script>
let QUEUES = {};
let ACTIVE = {};
let overlayTimer = null;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('tv-clock').textContent =
    now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('tv-date').textContent =
    now.toLocaleDateString('ru-RU', {weekday:'short', day:'numeric', month:'long'});
}
setInterval(updateClock, 1000);
updateClock();

function getPrefix(staff) {
  if (!staff || !staff.programs || !staff.programs.length) return 'S';
  const c = staff.programs[0];
  if (c.startsWith('8')) return 'D';
  if (c.startsWith('7')) return 'M';
  if (c.startsWith('K') || c.startsWith('k')) return 'C';
  return 'B';
}

window.addEventListener('DOMContentLoaded', function() {
  if (!window.db) return;

  window.db.ref('active').on('value', function(snap) {
    ACTIVE = snap.val() || {};
    renderGrid();
  });

  window.db.ref('queues').on('value', function(snap) {
    const newQ = snap.val() || {};

    Object.keys(newQ).forEach(function(id) {
      const newCur = newQ[id] ? newQ[id].current : 0;
      const oldCur = QUEUES[id] ? QUEUES[id].current : 0;
      if (newCur && newCur !== oldCur) {
        const staff = typeof STAFF_CONFIG !== 'undefined'
          ? STAFF_CONFIG.find(function(s){ return s.id === id; }) : null;
        showOverlay(id, newCur, staff);
        setTimeout(function() {
          const el = document.getElementById('card-' + id);
          if (el) { el.classList.add('just-called'); setTimeout(function(){ el.classList.remove('just-called'); }, 900); }
        }, 80);
      }
    });

    QUEUES = newQ;
    renderGrid();
  });
});

function showOverlay(staffId, number, staff) {
  if (overlayTimer) clearTimeout(overlayTimer);

  const prefix = getPrefix(staff);
  const numStr = String(number).padStart(3,'0');

  document.getElementById('ov-num').innerHTML = '<span>' + prefix + '-</span>' + numStr;
  document.getElementById('ov-cab').innerHTML =
    'Кабинет <b>' + (staff ? staff.cabinet : '—') + '</b>';
  document.getElementById('ov-cab-rus').textContent =
    staff ? staff.floor : '';

  // Reset bar animation
  const bar = document.getElementById('ov-bar');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = '';

  document.getElementById('tv-overlay').classList.add('show');

  // Sound
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 250, 500].forEach(function(d) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = d === 500 ? 1046 : 880;
      g.gain.setValueAtTime(0.35, ctx.currentTime + d/1000);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d/1000 + 0.4);
      osc.start(ctx.currentTime + d/1000);
      osc.stop(ctx.currentTime + d/1000 + 0.5);
    });
  } catch(e) {}

  overlayTimer = setTimeout(function() {
    document.getElementById('tv-overlay').classList.remove('show');
  }, 5000);
}

document.getElementById('tv-overlay').addEventListener('click', function() {
  clearTimeout(overlayTimer);
  this.classList.remove('show');
});

function renderGrid() {
  if (typeof STAFF_CONFIG === 'undefined') return;

  const visible = STAFF_CONFIG.filter(function(s) {
    return (ACTIVE[s.id] && ACTIVE[s.id].length > 0) ||
           (QUEUES[s.id] && (QUEUES[s.id].queue || []).length > 0);
  });

  if (!visible.length) {
    document.getElementById('tv-grid').innerHTML =
      '<div class="tv-empty">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' +
        '<h2>Қабылдау басталмады</h2>' +
        '<p>Приём ещё не начался</p>' +
      '</div>';
    updateTicker([]);
    return;
  }

  document.getElementById('tv-grid').innerHTML = visible.map(buildCard).join('');
  updateTicker(visible);
}

function buildCard(staff) {
  const data  = QUEUES[staff.id] || {};
  const cur   = data.current || 0;
  const prefix = getPrefix(staff);
  const hasCur = cur > 0;

  return '<div class="tv-card' + (hasCur ? ' active' : '') + '" id="card-' + staff.id + '">' +
    '<div class="card-cab-bar">' +
      '<div>' +
        '<div class="cab-num-kaz">Кабинет / Кабинет</div>' +
        '<div class="cab-num-rus">' + staff.floor + '</div>' +
      '</div>' +
      '<div class="cab-value">' + staff.cabinet + '</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="called-label-kaz">Шақырылған нөмір</div>' +
      '<div class="called-label-rus">Вызванный номер</div>' +
      '<div class="ticket-number' + (hasCur ? ' called' : '') + '">' +
        (hasCur
          ? '<span class="pfx">' + prefix + '-</span>' + String(cur).padStart(3,'0')
          : '—') +
      '</div>' +
      '<div class="status-row ' + (hasCur ? 'called' : 'idle') + '">' +
        '<div class="s-dot"></div>' +
        '<div>' +
          '<div class="status-kaz">' + (hasCur ? 'Шақырылды' : 'Күту') + '</div>' +
          '<div class="status-rus">' + (hasCur ? 'Вызван' : 'Ожидание') + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function updateTicker(staffList) {
  const items = [];
  staffList.forEach(function(s) {
    const d = QUEUES[s.id] || {};
    const cur = d.current || 0;
    const pfx = getPrefix(s);
    if (cur) {
      items.push('<span class="ti c"><span class="n">📢 ' + pfx + '-' + String(cur).padStart(3,'0') + '</span> → Кабинет ' + s.cabinet + '</span>');
    }
    const w = (d.queue||[]).filter(function(q){ return !q.called; }).length;
    if (w > 0) {
      items.push('<span class="ti"><span class="n">Каб. ' + s.cabinet + '</span>: ' + w + ' күтуде / ожидает</span>');
    }
  });

  if (!items.length) items.push('<span class="ti">Белсенді шақырулар жоқ / Активных вызовов нет</span>');

  const sep = '<span class="ti-sep">·</span>';
  const track = document.getElementById('ticker-track');
  const inner = items.join(sep);
  track.innerHTML = inner + sep + inner;
}
</script>
</body>
</html>
